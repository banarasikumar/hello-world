<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Well Family Salon - Coming Soon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap');

        :root {
            --primary: #d4af37; /* Gold */
            --text-main: #ffffff;
            --text-muted: #e0e0e0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #030008;
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* Canvas for Stars */
        #universe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Colorful Nebulas using CSS */
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            animation: pulse 20s infinite alternate ease-in-out, drift 50s infinite linear;
        }

        /* Vibrant cosmic colors: Purples, Pinks, Cyan, Deep Blues */
        .n1 { width: 70vw; height: 70vw; background: radial-gradient(circle, #4a00e0, transparent 60%); top: -20%; left: -20%; opacity: 0.5; }
        .n2 { width: 60vw; height: 60vw; background: radial-gradient(circle, #8e2de2, transparent 60%); bottom: -10%; right: -10%; animation-delay: -5s; opacity: 0.6; }
        .n3 { width: 50vw; height: 50vw; background: radial-gradient(circle, #ff007f, transparent 60%); top: 30%; left: 40%; animation-duration: 35s; opacity: 0.4;}
        .n4 { width: 80vw; height: 80vw; background: radial-gradient(circle, #00c6ff, transparent 60%); top: 10%; right: 20%; animation-delay: -15s; opacity: 0.3;}

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.2); opacity: 0.7; }
        }
        @keyframes drift {
            0% { transform: rotate(0deg) translate(0, 0); }
            50% { transform: rotate(180deg) translate(100px, 50px); }
            100% { transform: rotate(360deg) translate(0, 0); }
        }

        /* Content Container */
        .content-container {
            position: relative;
            z-index: 2;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.1); 
            backdrop-filter: blur(2px); /* Slight blur to pop text over stars */
            animation: fadeIn 3s ease-out forwards;
            pointer-events: none; /* Let clicks pass through to canvas */
        }

        /* Typography */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 8vw, 7rem);
            margin: 0 0 1rem 0;
            font-weight: 600;
            text-shadow: 0 0 30px rgba(255,255,255,0.4);
            background: linear-gradient(135deg, #ffffff 0%, #ffe259 50%, #ffa751 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: floatText 8s infinite ease-in-out;
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .subtitle {
            font-size: clamp(1.5rem, 3vw, 3rem);
            color: #ffffff;
            font-weight: 400;
            margin-bottom: 2rem;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        p {
            font-size: clamp(1rem, 1.8vw, 1.5rem);
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 3.5rem;
            max-width: 800px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .highlight {
            color: var(--primary);
            font-weight: 600;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        }

        /* Decorative Line */
        .divider {
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffe259, #ff007f, transparent);
            margin: 0 auto 2rem;
            animation: expandWidth 2s ease-out 1s forwards;
            box-shadow: 0 0 15px #ff007f;
        }

        @keyframes expandWidth {
            to { width: clamp(200px, 30vw, 400px); }
        }

        /* Glowing Badge */
        .badge {
            display: inline-block;
            padding: 18px 50px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: clamp(1rem, 1.2vw, 1.2rem);
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,255,255,0.1), inset 0 0 20px rgba(255,255,255,0.05);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto; /* Enable hover on badge */
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .badge:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 0 40px rgba(0, 198, 255, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.3);
            border-color: rgba(0, 198, 255, 0.8);
            letter-spacing: 6px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Tooltip hint */
        .hint {
            position: absolute;
            bottom: 2rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulseHint 3s infinite;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

    </style>
</head>
<body>
    <!-- Background Nebulas -->
    <div class="nebula n1"></div>
    <div class="nebula n2"></div>
    <div class="nebula n3"></div>
    <div class="nebula n4"></div>

    <!-- Starfield Canvas -->
    <canvas id="universe"></canvas>

    <!-- Content -->
    <div class="content-container">
        <h1>Hello World!</h1>
        <div class="divider"></div>
        <div class="subtitle">Welcome to <span class="highlight">Be Well Family Salon</span>.</div>
        <p>Our web application is currently under development. We're creating something beautiful for you.</p>
        <div class="badge">Stay tuned!</div>
        
        <div class="hint">Click & Hold to Warp</div>
    </div>

    <!-- Universe Animation Script -->
    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');

        let width, height;
        let stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = (Math.random() - 0.5) * width;
                this.y = (Math.random() - 0.5) * height;
                this.z = Math.random() * width;
                this.pz = this.z;
                // Add cosmic colors to stars
                const colors = ['#ffffff', '#ffffff', '#ffe259', '#00c6ff', '#ff007f', '#8e2de2'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update(speed) {
                this.z -= speed;
                if (this.z < 1) {
                    this.reset();
                    this.z = width;
                    this.pz = this.z;
                }
            }

            draw() {
                let sx = (this.x / this.z) * width + width / 2;
                let sy = (this.y / this.z) * height + height / 2;

                let px = (this.x / this.pz) * width + width / 2;
                let py = (this.y / this.pz) * height + height / 2;

                this.pz = this.z;

                // Make closer stars thicker
                let radius = width / this.z * 1.2;

                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = radius;
                ctx.moveTo(px, py);
                ctx.lineTo(sx, sy);
                ctx.stroke();
            }
        }

        // Initialize stars
        const numStars = 1000;
        for (let i = 0; i < numStars; i++) {
            stars.push(new Star());
        }

        let baseSpeed = 1.5;
        let speed = baseSpeed;
        let targetSpeed = baseSpeed;

        function animate() {
            // Dark fade to create light trails
            ctx.fillStyle = 'rgba(3, 0, 8, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Smooth speed transitions
            speed += (targetSpeed - speed) * 0.05;

            // Add dynamic wave to speed for organic feel
            let time = Date.now() * 0.001;
            let dynamicSpeed = speed + (targetSpeed === baseSpeed ? Math.sin(time) * 0.5 : 0);

            stars.forEach(star => {
                star.update(dynamicSpeed);
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        // Interactive Warp Speed on click
        const container = document.querySelector('.content-container');
        window.addEventListener('mousedown', () => targetSpeed = 25);
        window.addEventListener('mouseup', () => targetSpeed = baseSpeed);
        window.addEventListener('touchstart', () => targetSpeed = 25);
        window.addEventListener('touchend', () => targetSpeed = baseSpeed);

    </script>
</body>
</html>
