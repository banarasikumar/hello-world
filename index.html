<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Well Family Salon - Coming Soon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap');

        :root {
            --primary: #d4af37; /* Elegant Gold */
            --bg-color: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Gradient */
        .bg-animation {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.08) 0%, rgba(26, 26, 26, 1) 50%);
            animation: rotateBg 25s linear infinite;
            z-index: 0;
        }

        @keyframes rotateBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Floating particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.1);
            filter: blur(20px);
            animation: float 8s infinite ease-in-out;
            z-index: 0;
        }

        .p1 { width: 250px; height: 250px; top: 5%; left: 10%; animation-delay: 0s; }
        .p2 { width: 180px; height: 180px; bottom: 15%; right: 5%; animation-delay: 2s; }
        .p3 { width: 120px; height: 120px; top: 35%; right: 20%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.1); }
        }

        /* Full Page Glassmorphism Container */
        .full-page-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
            animation: fadeInContainer 1.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInContainer {
            to { opacity: 1; }
        }

        /* Typography */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5vw; /* Scales with screen width */
            margin: 0 0 1rem 0;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideDown 1.5s ease-out 0.5s forwards;
            opacity: 0;
            transform: translateY(-30px);
        }

        @keyframes slideDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            font-size: 2vw; /* Scales with screen width */
            color: #ffffff;
            font-weight: 400;
            margin-bottom: 2rem;
            animation: fadeIn 1.5s ease-out 0.7s forwards;
            opacity: 0;
        }

        p {
            font-size: 1.2vw;
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 3.5rem;
            max-width: 800px;
            animation: fadeIn 1.5s ease-out 0.9s forwards;
            opacity: 0;
        }

        .highlight {
            color: var(--primary);
            font-weight: 500;
        }

        /* Decorative Line */
        .divider {
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 0 auto 2rem;
            animation: expandWidth 1.5s ease-out 1.2s forwards;
        }

        @keyframes expandWidth {
            to { width: 20vw; }
        }

        /* Micro-animated badge */
        .badge {
            display: inline-block;
            padding: 16px 40px;
            border-radius: 40px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            animation: slideUp 1.5s ease-out 1.5s forwards;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge:hover {
            background: rgba(212, 175, 55, 0.2);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 35px -10px rgba(212, 175, 55, 0.5);
            border-color: rgba(212, 175, 55, 0.8);
        }

        /* Shimmer effect inside badge */
        .badge::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            50%, 100% { left: 200%; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Responsive constraints for smaller devices */
        @media (max-width: 1024px) {
            h1 { font-size: 6vw; }
            .subtitle { font-size: 2.5vw; }
            p { font-size: 1.8vw; }
            .divider { animation-name: expandWidthSmall; }
            @keyframes expandWidthSmall { to { width: 30vw; } }
        }

        @media (max-width: 768px) {
            h1 { font-size: 8vw; }
            .subtitle { font-size: 4vw; }
            p { font-size: 3vw; }
            .badge { font-size: 1rem; padding: 12px 30px; }
            .divider { animation-name: expandWidthMobile; }
            @keyframes expandWidthMobile { to { width: 40vw; } }
        }

        @media (max-width: 480px) {
            h1 { font-size: 10vw; }
            .subtitle { font-size: 5vw; }
            p { font-size: 4vw; }
            .badge { font-size: 0.9rem; padding: 10px 24px; }
            .divider { animation-name: expandWidthTiny; }
            @keyframes expandWidthTiny { to { width: 50vw; } }
        }
    </style>
</head>
<body>
    <!-- Background Animations -->
    <div class="bg-animation"></div>
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>

    <!-- Main Content -->
    <div class="full-page-container">
        <h1>Hello World!</h1>
        <div class="divider"></div>
        <div class="subtitle">Welcome to <span class="highlight">Be Well Family Salon</span>.</div>
        <p>Our web application is currently under development. We're creating something beautiful for you.</p>
        <div class="badge">Stay tuned!</div>
    </div>
</body>
</html>
