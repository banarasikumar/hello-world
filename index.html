<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#030008">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Be Well Family Salon - Coming Soon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap');

        /* Force GPU Hardware Acceleration */
        canvas, .nebula, .salon-name, .magic-btn, .magic-btn::before, .content-container, .hello-world, .subtitle {
            will-change: transform, opacity, filter, box-shadow;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            perspective: 1000px;
            -webkit-perspective: 1000px;
        }

        :root {
            --primary: #e6c875;
            --text-main: #ffffff;
            --text-muted: #d0d0d0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #030008;
            color: var(--text-main);
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Canvas for Stars */
        #universe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Colorful Nebulas using CSS */
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            animation: pulse 20s infinite alternate ease-in-out, drift 50s infinite linear;
        }

        .n1 { width: 70vw; height: 70vw; background: radial-gradient(circle, #4a00e0, transparent 60%); top: -20%; left: -20%; opacity: 0.5; }
        .n2 { width: 60vw; height: 60vw; background: radial-gradient(circle, #8e2de2, transparent 60%); bottom: -10%; right: -10%; animation-delay: -5s; opacity: 0.6; }
        .n3 { width: 50vw; height: 50vw; background: radial-gradient(circle, #ff007f, transparent 60%); top: 30%; left: 40%; animation-duration: 35s; opacity: 0.4;}
        .n4 { width: 80vw; height: 80vw; background: radial-gradient(circle, #00c6ff, transparent 60%); top: 10%; right: 20%; animation-delay: -15s; opacity: 0.3;}

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1.2); opacity: 0.5; }
        }
        @keyframes drift {
            0% { transform: rotate(0deg) translate(0, 0); }
            50% { transform: rotate(180deg) translate(100px, 50px); }
            100% { transform: rotate(360deg) translate(0, 0); }
        }

        /* Content Container */
        .content-container {
            position: relative;
            z-index: 2;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
            background: radial-gradient(circle at center, rgba(0, 0, 0, 0.3) 0%, transparent 70%);
            animation: fadeIn 3s ease-out forwards;
            pointer-events: none;
        }

        /* Typography */
        .hello-world {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(0.8rem, 1.2vw, 1.2rem);
            letter-spacing: 12px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2rem;
            animation: floatText 8s infinite ease-in-out reverse;
        }

        .salon-name {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 6vw, 6rem);
            line-height: 1.3;
            margin: 0 0 1.5rem 0;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(to right, #fff, #ffe259, #ff007f, #00c6ff, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite, floatText 8s infinite ease-in-out;
            text-shadow: 0 4px 20px rgba(255, 226, 89, 0.2);
            padding: 0 20px;
            max-width: 90vw;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .subtitle {
            font-size: clamp(1rem, 1.5vw, 1.5rem);
            color: var(--text-main);
            font-weight: 300;
            margin-bottom: 3rem;
            max-width: 700px;
            line-height: 1.8;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            padding: 0 20px;
            animation: fadeIn 3s ease-out 1s forwards;
            opacity: 0;
        }

        /* Irresistible Button (Small Size) */
        .magic-btn-container {
            position: relative;
            pointer-events: auto;
        }

        .magic-btn {
            appearance: none;
            border: none;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.0));
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 12px 35px;
            border-radius: 40px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 198, 255, 0.2), inset 0 0 15px rgba(255, 255, 255, 0.1);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px rgba(0, 198, 255, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.1); text-shadow: 0 0 5px rgba(255,255,255,0.5); }
            100% { box-shadow: 0 0 40px rgba(255, 0, 127, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.3); text-shadow: 0 0 15px rgba(255,255,255,1); border-color: rgba(255,255,255,0.8); }
        }

        .magic-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-20deg);
            animation: buttonShimmer 2.5s infinite;
        }

        @keyframes buttonShimmer {
            0% { left: -100%; }
            20%, 100% { left: 200%; }
        }

        .magic-btn:hover {
            transform: scale(1.02) translateY(-1px);
            background: rgba(255, 255, 255, 0.15);
            letter-spacing: 4px;
        }

        .magic-btn:active {
            transform: scale(0.99) translateY(0);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.8);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Tooltip hint */
        .hint {
            position: absolute;
            bottom: 2rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: pulseHint 3s infinite;
            pointer-events: none;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

    </style>
</head>
<body>
    <!-- Background Nebulas -->
    <div class="nebula n1"></div>
    <div class="nebula n2"></div>
    <div class="nebula n3"></div>
    <div class="nebula n4"></div>

    <!-- Starfield Canvas -->
    <canvas id="universe"></canvas>

    <!-- Content -->
    <div class="content-container">
        <div class="hello-world">Hello World</div>
        <div class="salon-name">Be Well Family Salon</div>
        <div class="subtitle">Our web application is currently under development. <br>We're creating something beautiful for you.</div>
        
        <div class="magic-btn-container">
            <button class="magic-btn" id="magicBtn">Ignite The Glow</button>
        </div>
        
        <div class="hint">Hold button to accelerate universe</div>
    </div>

    <script>
        // --- Universe Background (Realistic 3D) ---
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');

        let width, height;
        let stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                // Spread stars out far beyond viewport so rotation doesn't reveal empty corners
                this.x = (Math.random() - 0.5) * width * 3;
                this.y = (Math.random() - 0.5) * height * 3;
                this.z = Math.random() * width;
                this.pz = this.z;
                
                // Realistic star colors (White, faint blue, faint yellow, faint pink)
                const colors = ['#ffffff', '#ffffff', '#e0f7fa', '#fff9c4', '#ffebee', '#f3e5f5'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // Base size variation
                this.baseSize = Math.random() * 1.5 + 0.5;
            }

            update(speed) {
                this.pz = this.z;
                this.z -= speed;
                if (this.z < 1) {
                    this.reset();
                    this.z = width;
                    this.pz = this.z;
                }
            }

            draw() {
                // Perspective division
                let sx = (this.x / this.z) * width + width / 2;
                let sy = (this.y / this.z) * height + height / 2;
                
                let px = (this.x / this.pz) * width + width / 2;
                let py = (this.y / this.pz) * height + height / 2;

                // Dynamic size based on depth (closer = larger)
                let size = (width / this.z) * this.baseSize * 0.5;
                if (size > 10) size = 10;
                
                // Depth cue fading (far away = dim, closer = bright)
                let opacity = 1 - (this.z / width);
                if (opacity < 0) opacity = 0;
                if (opacity > 1) opacity = 1;

                ctx.globalAlpha = opacity;
                
                // Calculate distance traveled to determine if we should draw a motion streak or a perfect dot
                let dist = Math.sqrt(Math.pow(sx - px, 2) + Math.pow(sy - py, 2));
                
                if (dist > size) {
                    // Motion blur streak when traveling fast
                    ctx.beginPath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = size;
                    ctx.lineCap = 'round';
                    ctx.moveTo(px, py);
                    ctx.lineTo(sx, sy);
                    ctx.stroke();
                } else {
                    // Realistic glowing dots when moving slowly
                    ctx.beginPath();
                    ctx.fillStyle = this.color;
                    ctx.arc(sx, sy, size, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.globalAlpha = 1.0; // reset
            }
        }

        const numStars = 1200; // Increased star count for more density
        for (let i = 0; i < numStars; i++) {
            stars.push(new Star());
        }

        let baseSpeed = 1.0; // Slower base speed for calm realism
        let speed = baseSpeed;
        let targetSpeed = baseSpeed;
        
        let isButtonPressed = false;
        let rotationAngle = 0;

        function animate() {
            // Draw pure dark background to simulate true empty space
            ctx.fillStyle = '#030008';
            ctx.fillRect(0, 0, width, height);

            // Gentle acceleration when held, but fast deceleration when released
            let smoothingFactor = isButtonPressed ? 0.005 : 0.04;
            speed += (targetSpeed - speed) * smoothingFactor; 

            // Subtly rotate the entire universe like a galaxy
            rotationAngle += 0.0003;

            ctx.save();
            ctx.translate(width / 2, height / 2);
            ctx.rotate(rotationAngle);
            ctx.translate(-width / 2, -height / 2);

            stars.forEach(star => {
                star.update(speed);
                star.draw();
            });

            ctx.restore();

            requestAnimationFrame(animate);
        }

        animate();

        const magicBtn = document.getElementById('magicBtn');
        
        // Handle Button Hold for Warp Speed Acceleration
        function handleButtonDown(e) {
            isButtonPressed = true;
            targetSpeed = 50; // Increased slightly to show off 3D streak effect
            
            magicBtn.style.transform = 'scale(0.99)';
            setTimeout(() => {
                if(!isButtonPressed) magicBtn.style.transform = '';
            }, 150);
        }

        function handleButtonUp() {
            isButtonPressed = false;
            targetSpeed = baseSpeed;
            magicBtn.style.transform = '';
        }

        magicBtn.addEventListener('mousedown', handleButtonDown);
        window.addEventListener('mouseup', handleButtonUp);

        magicBtn.addEventListener('touchstart', (e) => {
            handleButtonDown(e.touches[0]);
        });
        window.addEventListener('touchend', handleButtonUp);

    </script>
</body>
</html>
